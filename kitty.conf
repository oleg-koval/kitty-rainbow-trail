# kitty-starter: boilerplate for kitty terminal customizations
#
# This is generic scaffolding for building kittens, remote-control tools, or
# just documented config snippets you want to carry between machines - not a
# specific effect. Uncomment/adjust for your own kitty.conf.

# Remote control is required for any kitten (like this template's
# `kitty-starter` CLI, or your own) that needs to inspect or modify a running
# kitty instance from the outside.
allow_remote_control socket-only
listen_on unix:/tmp/kitty-starter

# Example `include`-based override pattern: a tool can rewrite a small conf
# file and ask kitty to hot-reload (`kitty @ load-config`) to apply changes
# live, without touching kitty.conf itself.
# include kitty-starter-override.conf

# Example keybinding for launching a background kitten:
# map ctrl+shift+p launch --type=background --allow-remote-control kitty-starter ping
