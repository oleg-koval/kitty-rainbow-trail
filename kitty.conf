# kitty-starter: the "flying, jumping" cursor trail
#
# kitty >= 0.36 can animate the cursor so it glides/smears toward its new
# position instead of teleporting. These four settings control that effect.
# Every value below is copy-paste ready; see README.md for the full
# customization guide including the rainbow-cycling `rainbow-trail` kitten.

# Milliseconds of stillness before the trail starts catching up to the
# cursor. Lower = snappier/more aggressive trail. 0 disables the trail
# entirely (falls back to kitty's normal instant-jump cursor).
cursor_trail 1

# Fade timing in seconds: "<fade-in> <fade-out>". First value controls how
# quickly the trail appears, second controls how quickly it fades away once
# the cursor stops moving.
cursor_trail_decay 0.2 0.9

# Minimum number of cells the cursor must move before the trail animates.
# Keeps single-character typing from constantly re-triggering the effect.
cursor_trail_start_threshold 1

# Static trail color. This is overwritten while `rainbow-trail` is running
# (see below) - set here as the color used when rainbow mode is off, or
# `none` to just use the normal cursor color with no distinct trail tint.
cursor_trail_color none

# --- Rainbow cycling ------------------------------------------------------
# kitty has no native gradient/rainbow trail - `cursor_trail_color` only
# accepts one solid color. The `rainbow-trail` kitten (installed via this
# repo, see README.md) works around that by rewriting the line below and
# asking kitty to hot-reload several times a second, sweeping
# cursor_trail_color through the hue wheel.
#
# 1. Remote control must be enabled for the kitten to talk to this instance:
allow_remote_control socket-only
listen_on unix:/tmp/kitty-rainbow-trail

# 2. This include is what `rainbow-trail` rewrites on every color tick.
#    The file is created automatically on first run; nothing to do here.
include rainbow-trail-override.conf

# 3. Optional: bind a key to toggle the rainbow cycle on/off.
map ctrl+shift+r launch --type=background --allow-remote-control rainbow-trail toggle
