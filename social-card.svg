<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">kitty-starter social preview</title>
  <desc id="desc">kitty-starter: a flying, jumping, rainbow-cycling cursor trail for the kitty terminal.</desc>
  <defs>
    <linearGradient id="trail" x1="120" y1="470" x2="420" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="25%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="75%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0d1117"/>
  <path d="M150 480 C 230 480, 310 330, 420 220" fill="none" stroke="url(#trail)"
        stroke-width="52" stroke-linecap="round" opacity="0.9"/>
  <rect x="392" y="164" width="76" height="120" rx="16" fill="#f5f5f5"/>

  <text x="540" y="270" font-family="monospace" font-size="64"
        font-weight="700" fill="#f5f5f5">kitty-starter</text>
  <text x="540" y="322" font-family="sans-serif" font-size="30"
        fill="#9ca3af">A flying, jumping, rainbow-cycling cursor trail</text>
  <text x="540" y="360" font-family="sans-serif" font-size="30"
        fill="#9ca3af">for the kitty terminal.</text>

  <text x="540" y="430" font-family="monospace" font-size="24"
        fill="#22c55e">cursor_trail tuning</text>
  <text x="540" y="466" font-family="monospace" font-size="24"
        fill="#0ea5e9">rainbow-cycling kitten</text>
  <text x="540" y="502" font-family="monospace" font-size="24"
        fill="#a855f7">uv + ruff + ty tooling</text>

  <text x="64" y="600" font-family="sans-serif" font-size="24"
        fill="#6b7280">github.com/oleg-koval/kitty-starter</text>
</svg>
